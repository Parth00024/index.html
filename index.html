<script>

const CSV_URL = "https://docs.google.com/spreadsheets/d/1KdSahdmSit355aQDZ1vNNu6ZgiQpQMnKENoQ-HiPYg0/export?format=csv";

const params = new URLSearchParams(window.location.search);
const certId = params.get("id");

if (!certId) {
  document.getElementById("result").innerHTML =
    "<h3 class='invalid'>Invalid Request</h3>";
} else {

  fetch(CSV_URL)
    .then(response => response.text())
    .then(data => {

      const rows = data.trim().split("\n");
      const headers = rows[0].split(",");

      const certCol = headers.indexOf("cert_id");
      const nameCol = headers.indexOf("name");
      const eventCol = headers.indexOf("event");

      let found = false;

      for (let i = 1; i < rows.length; i++) {

        const cols = rows[i].split(",");

        if (cols[certCol] && cols[certCol].trim() === certId.trim()) {

          found = true;

          document.getElementById("result").innerHTML =
            "<h3 class='valid'>✅ Certificate Verified</h3>" +
            "<p><strong>Name:</strong> " + cols[nameCol] + "</p>" +
            "<p><strong>Event:</strong> " + cols[eventCol] + "</p>" +
            "<p><strong>Certificate ID:</strong> " + certId + "</p>";

          break;
        }
      }

      if (!found) {
        document.getElementById("result").innerHTML =
          "<h3 class='invalid'>❌ Invalid Certificate</h3>";
      }
    });
}

</script>
