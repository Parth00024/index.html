<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Certificate Verification</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 80px;
  }
  .valid { color: green; }
  .invalid { color: red; }
</style>
</head>
<body>

<h2>Certificate Verification</h2>
<div id="result">Checking certificate...</div>

<script>

// 🔴 ADD YOUR CERTIFICATES HERE
const certificates = {
  "SG2026-A1D92242": {
    name: "Rahul Patel",
    event: "Sovereign's Gambit"
  },
  "SG2026-B3X7F921": {
    name: "Mehul Shah",
    event: "Sovereign's Gambit"
  }
};

// Get ID from URL
const params = new URLSearchParams(window.location.search);
const certId = params.get("id");

if (!certId) {
  document.getElementById("result").innerHTML =
    "<h3 class='invalid'>Invalid Request</h3>";
} else if (certificates[certId]) {

  const data = certificates[certId];

  document.getElementById("result").innerHTML =
    "<h3 class='valid'>✅ Certificate Verified</h3>" +
    "<p><strong>Name:</strong> " + data.name + "</p>" +
    "<p><strong>Event:</strong> " + data.event + "</p>" +
    "<p><strong>Certificate ID:</strong> " + certId + "</p>";

} else {

  document.getElementById("result").innerHTML =
    "<h3 class='invalid'>❌ Invalid Certificate</h3>";
}

</script>

</body>
</html>
